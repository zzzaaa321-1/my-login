<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Login 全栈系统测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
        }
        .status {
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .loading {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #0056b3;
        }
        input {
            padding: 8px;
            margin: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
            width: 200px;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        pre {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>My Login 全栈系统测试</h1>
    
    <div class="container">
        <h2>系统状态</h2>
        
        <div class="test-section">
            <h3>1. 后端服务 (Spring Boot)</h3>
            <div id="backend-status" class="status loading">检查中...</div>
            <button onclick="testBackend()">测试后端</button>
        </div>
        
        <div class="test-section">
            <h3>2. 前端服务 (Vue 3)</h3>
            <div id="frontend-status" class="status loading">检查中...</div>
            <button onclick="testFrontend()">测试前端</button>
        </div>
        
        <div class="test-section">
            <h3>3. 登录功能测试</h3>
            <div>
                <input type="text" id="username" placeholder="用户名" value="admin">
                <input type="password" id="password" placeholder="密码" value="admin123">
                <button onclick="testLogin()">测试登录</button>
            </div>
            <div id="login-result" class="status"></div>
        </div>
        
        <div class="test-section">
            <h3>4. Token 验证测试</h3>
            <div id="token-result" class="status">登录成功后自动测试</div>
        </div>
        
        <div class="test-section">
            <h3>5. 完整流程测试</h3>
            <button onclick="testFullFlow()">运行完整测试</button>
            <div id="full-test-result" class="status"></div>
        </div>
    </div>
    
    <script>
        const BACKEND_URL = 'http://localhost:8082';
        const FRONTEND_URL = 'http://localhost:8083';
        
        async function testBackend() {
            const statusDiv = document.getElementById('backend-status');
            statusDiv.className = 'status loading';
            statusDiv.textContent = '测试中...';
            
            try {
                const response = await fetch(`${BACKEND_URL}/api/auth/health`);
                if (response.ok) {
                    const text = await response.text();
                    statusDiv.className = 'status success';
                    statusDiv.innerHTML = `✅ 后端服务正常<br>响应: ${text}`;
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = `❌ 后端服务异常: ${error.message}`;
            }
        }
        
        async function testFrontend() {
            const statusDiv = document.getElementById('frontend-status');
            statusDiv.className = 'status loading';
            statusDiv.textContent = '测试中...';
            
            try {
                const response = await fetch(FRONTEND_URL);
                if (response.ok) {
                    statusDiv.className = 'status success';
                    statusDiv.textContent = '✅ 前端服务正常';
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = `❌ 前端服务异常: ${error.message}`;
            }
        }
        
        async function testLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('login-result');
            
            resultDiv.className = 'status loading';
            resultDiv.textContent = '登录中...';
            
            try {
                const response = await fetch(`${BACKEND_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    resultDiv.className = 'status success';
                    resultDiv.innerHTML = `✅ 登录成功<br>
                        用户名: ${data.username}<br>
                        角色: ${data.role}<br>
                        Token: ${data.token.substring(0, 30)}...`;
                    
                    // 保存token用于后续测试
                    window.testToken = data.token;
                    
                    // 自动测试token验证
                    setTimeout(testTokenValidation, 1000);
                } else {
                    resultDiv.className = 'status error';
                    resultDiv.textContent = `❌ 登录失败: ${data.message}`;
                }
            } catch (error) {
                resultDiv.className = 'status error';
                resultDiv.textContent = `❌ 登录请求失败: ${error.message}`;
            }
        }
        
        async function testTokenValidation() {
            const resultDiv = document.getElementById('token-result');
            
            if (!window.testToken) {
                resultDiv.className = 'status error';
                resultDiv.textContent = '❌ 请先登录获取token';
                return;
            }
            
            resultDiv.className = 'status loading';
            resultDiv.textContent = '验证token中...';
            
            try {
                const response = await fetch(`${BACKEND_URL}/api/auth/validate?token=${window.testToken}`, {
                    method: 'POST'
                });
                
                const isValid = await response.text();
                
                if (isValid === 'true') {
                    resultDiv.className = 'status success';
                    resultDiv.textContent = '✅ Token验证成功';
                } else {
                    resultDiv.className = 'status error';
                    resultDiv.textContent = '❌ Token验证失败';
                }
            } catch (error) {
                resultDiv.className = 'status error';
                resultDiv.textContent = `❌ Token验证请求失败: ${error.message}`;
            }
        }
        
        async function testFullFlow() {
            const resultDiv = document.getElementById('full-test-result');
            resultDiv.className = 'status loading';
            resultDiv.textContent = '开始完整测试...';
            
            const tests = [];
            
            // 测试1: 后端健康检查
            tests.push(async () => {
                const response = await fetch(`${BACKEND_URL}/api/auth/health`);
                if (!response.ok) throw new Error('后端服务异常');
                return '后端服务正常';
            });
            
            // 测试2: 前端健康检查
            tests.push(async () => {
                const response = await fetch(FRONTEND_URL);
                if (!response.ok) throw new Error('前端服务异常');
                return '前端服务正常';
            });
            
            // 测试3: 登录测试
            tests.push(async () => {
                const response = await fetch(`${BACKEND_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: 'admin', password: 'admin123' })
                });
                const data = await response.json();
                if (!data.success) throw new Error('登录失败');
                window.testToken = data.token;
                return `登录成功 (用户: ${data.username}, 角色: ${data.role})`;
            });
            
            // 测试4: Token验证
            tests.push(async () => {
                const response = await fetch(`${BACKEND_URL}/api/auth/validate?token=${window.testToken}`, {
                    method: 'POST'
                });
                const isValid = await response.text();
                if (isValid !== 'true') throw new Error('Token验证失败');
                return 'Token验证成功';
            });
            
            try {
                const results = [];
                for (let i = 0; i < tests.length; i++) {
                    resultDiv.textContent = `运行测试 ${i + 1}/${tests.length}...`;
                    const result = await tests[i]();
                    results.push(`✅ ${result}`);
                }
                
                resultDiv.className = 'status success';
                resultDiv.innerHTML = `<strong>🎉 所有测试通过！</strong><br>` + results.join('<br>');
            } catch (error) {
                resultDiv.className = 'status error';
                resultDiv.textContent = `❌ 测试失败: ${error.message}`;
            }
        }
        
        // 页面加载时自动测试
        window.onload = function() {
            testBackend();
            testFrontend();
        };
        
        // 添加一些调试信息
        console.log("测试页面加载完成");
        console.log("后端URL:", BACKEND_URL);
        console.log("前端URL:", FRONTEND_URL);
    </script>
</body>
</html>
